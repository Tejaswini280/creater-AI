version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: creator-ai-postgres
    environment:
      POSTGRES_DB: creators_dev_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for sessions and caching)
  redis:
    image: redis:7-alpine
    container_name: creator-ai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creator-ai-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/creators_dev_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: creators_dev_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: CreatorNexus-Dev-Secret-2024-Docker
      JWT_SECRET: CreatorNexus-JWT-Secret-2024-Docker
      JWT_REFRESH_SECRET: CreatorNexus-Refresh-Secret-2024-Docker
      SKIP_RATE_LIMIT: 1
      PERF_MODE: 1
      # Add your API keys here
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_api_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
      KLING_ACCESS_KEY: ${KLING_ACCESS_KEY:-your_kling_access_key_here}
      KLING_SECRET_KEY: ${KLING_SECRET_KEY:-your_kling_secret_key_here}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-your_huggingface_api_key_here}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data: